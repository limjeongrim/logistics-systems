{% extends "base.html" %}
{% block title %}Add Vehicle{% endblock %}
{% block page_title %}Add Vehicle{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Vehicle to Fleet</h1>
  <p>Register a new vehicle and driver</p>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header">
        <h5><i class="fa-solid fa-truck me-2 text-primary"></i>Vehicle Details</h5>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-sm-6">
              <label class="form-label">Plate Number <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="plate"
                     placeholder="TMS-X001" style="text-transform:uppercase;" required>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Vehicle Type <span class="text-danger">*</span></label>
              <select class="form-select" name="type" required>
                <option value="">— Select type —</option>
                <option value="truck_large">Large Truck (15,000 kg)</option>
                <option value="truck_medium">Medium Truck (5,000 kg)</option>
                <option value="van">Van (1,500 kg)</option>
                <option value="motorcycle">Motorcycle (100 kg)</option>
                <option value="refrigerated">Refrigerated Truck (8,000 kg)</option>
              </select>
            </div>
            <div class="col-sm-6">
              <label class="form-label">Capacity (kg)</label>
              <input type="number" class="form-control" name="capacity_kg" min="0" step="100" placeholder="5000">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Capacity (m³)</label>
              <input type="number" class="form-control" name="capacity_m3" min="0" step="0.5" placeholder="25">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Driver Name</label>
              <input type="text" class="form-control" name="driver_name" placeholder="Full name">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Driver Phone</label>
              <input type="text" class="form-control" name="driver_phone" placeholder="010-xxxx-xxxx">
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Special features, restrictions..."></textarea>
            </div>
          </div>
          <hr class="my-4">
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-plus me-2"></i>Add to Fleet
            </button>
            <a href="{{ url_for('vehicles') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
