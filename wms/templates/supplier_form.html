{% extends "base.html" %}
{% block title %}공급업체 등록{% endblock %}
{% block page_title %}공급업체 등록{% endblock %}

{% block content %}
<div class="page-header">
  <h1>공급업체 등록</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-600">업체명 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required placeholder="예: 삼성전자 B2B 직판"/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-600">담당자</label>
              <input type="text" name="contact_person" class="form-control" placeholder="홍길동"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">전화번호</label>
              <input type="text" name="phone" class="form-control" placeholder="02-1234-5678"/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600">이메일</label>
            <input type="email" name="email" class="form-control" placeholder="contact@supplier.co.kr"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600">주소</label>
            <input type="text" name="address" class="form-control" placeholder="서울특별시 강남구…"/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label fw-600">납기일 (일)</label>
              <input type="number" name="lead_time_days" class="form-control" value="7" min="1" max="90"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-600">평점 (1~5)</label>
              <input type="number" name="rating" class="form-control" value="3.0" min="1" max="5" step="0.1"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-600">취급 카테고리</label>
              <select name="category" class="form-select">
                <option value="">— 선택 —</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-600">메모</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="특이사항, 결제 조건 등…"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-1"></i>등록</button>
            <a href="{{ url_for('suppliers') }}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
